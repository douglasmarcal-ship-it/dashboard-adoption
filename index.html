<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adoption Center</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

h1{
    margin-bottom:20px;
}

.card{
    background:#1e293b;
    border-radius:12px;
    padding:20px;
    margin-bottom:15px;
}

.loading{
    color:#94a3b8;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    padding:12px;
    border-bottom:1px solid #334155;
    text-align:left;
}

th{
    background:#1e293b;
}

tr:hover{
    background:#1e293b;
}

</style>
</head>

<body>

<h1>Adoption Center</h1>

<div class="card">
    <div id="status" class="loading">
        Carregando dados...
    </div>
</div>

<div class="card">
    <table id="tabela">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyomj4_vR7IKgVuhLZKhRVtHwGnvT1RFknEAI0lNhv8hYS4ftwyLDHSGG4tudruIjedcw/exec";

async function carregarDados(){

    try{

        const response = await fetch(API_URL);

        const data = await response.json();

        document.getElementById("status").innerHTML =
            "✅ " + data.length + " registros carregados";

        montarTabela(data);

    }catch(err){

        document.getElementById("status").innerHTML =
            "❌ Erro ao carregar API";

        console.error(err);
    }
}

function montarTabela(data){

    if(!data.length) return;

    const headers = Object.keys(data[0]);

    let th = "<tr>";

    headers.forEach(h=>{
        th += `<th>${h}</th>`;
    });

    th += "</tr>";

    document.getElementById("thead").innerHTML = th;

    let rows = "";

    data.forEach(item=>{

        rows += "<tr>";

        headers.forEach(h=>{
            rows += `<td>${item[h] ?? ""}</td>`;
        });

        rows += "</tr>";
    });

    document.getElementById("tbody").innerHTML = rows;
}

carregarDados();

</script>

</body>
</html>
