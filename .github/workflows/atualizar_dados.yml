name: Atualizar Dados do Dashboard

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar bibliotecas
        run: pip install pandas

      - name: Injetar Dados no HTML
        shell: python
        run: |
          import pandas as pd
          import json
          import re

          # 1. COLOQUE O SEU LINK DA PLANILHA AQUI DENTRO DAS ASPAS:
          url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTDOeEqui_w4j0bSUh9zPz-1yXOAxUB3RT4glNpD1rJzgd01oE61rXmOCVoUMjWzDNph4lsGPFIyC7e/pub?gid=0&single=true&output=csv'
          
          df = pd.read_csv(url, skiprows=1)
          df = df.fillna('')

          dados = []
          for _, row in df.iterrows():
              parceiro = str(row.get('PARCEIRO', '')).strip()
              if not parceiro or parceiro == 'PARCEIRO' or 'Media d' in parceiro: continue

              termo = str(row.get('ID', row.get('Termometro', ''))).lower()
              if 'verde' in termo or '🟢' in termo: termo = 'verde'
              elif 'amarelo' in termo or '🟡' in termo: termo = 'amarelo'
              elif 'vermelho' in termo or '🔴' in termo: termo = 'vermelho'
              else: termo = 'verde'

              mrr_val = row.get('MRR Atual', 0)
              try:
                  if isinstance(mrr_val, str): mrr = float(mrr_val.replace('.', '').replace(',', '.'))
                  else: mrr = float(mrr_val)
              except: mrr = 0.0

              try: prazo = int(float(str(row.get('Prazo (Deploy até Go live)', '0'))))
              except: prazo = 0

              try: ticket = int(float(str(row.get('Ticket Zendesk', '0'))))
              except: ticket = 0

              item = {
                  "p": parceiro,
                  "gl": str(row.get('Dt. Go-Live (Efetivo)', row.get('Dt. Go-Live (Previsto)', ''))),
                  "tipo": str(row.get('Tipo', '')),
                  "metod": str(row.get('Metodologia', '')),
                  "metod_full": str(row.get('Metodologia', '')),
                  "etapa": str(row.get('Etapa Jornada', '-')),
                  "termo": termo,
                  "rb": 'Sim' if 'sim' in str(row.get('RollBack', '')).lower() else 'Nao',
                  "cliente": str(row.get('Status Cliente', '')),
                  "adop": str(row.get('Status Adoptiom', '')),
                  "mrr": mrr,
                  "prazo": prazo,
                  "bp": str(row.get("Descrição (Unidades/BP's)", '')),
                  "seg": str(row.get('Segmento Principal', '')),
                  "gp": "",
                  "obs": str(row.get('Observação', '')),
                  "ocorr": 'Sim' if 'sim' in str(row.get('Ocorrencia', '')).lower() else 'Nao',
                  "tipo_inc": str(row.get('Tipo.1', '')),
                  "ticket": ticket,
                  "regs": []
              }
              dados.append(item)

          json_data = json.dumps(dados, ensure_ascii=False)

          # 2. Injeta os dados limpos diretamente no index.html
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          padrao = r'/\*\s*\[ADOPTION_DATA_BEGIN\]\s*\*/.*?/\*\s*\[ADOPTION_DATA_END\]\s*\*/'
          substituto = f'/* [ADOPTION_DATA_BEGIN] */\nvar DATA = {json_data};\n/* [ADOPTION_DATA_END] */'
          novo_html = re.sub(padrao, substituto, html, flags=re.DOTALL)

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(novo_html)

      - name: Publicar Dashboard Atualizado
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Robo Atualizador"
          git add index.html
          git commit -m "Robô injetou os dados da planilha no painel" || echo "Sem mudanças"
          git push
